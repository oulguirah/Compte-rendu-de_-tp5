<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TP - Manipulation du DOM</title>
  <link rel="stylesheet" href="exe3.css">
</head>
<body>

  <h1 id="titre-principal">Bienvenue sur la page TP</h1>

  <div id="container">
    <p>Paragraphe introductif hors bloc.</p>

    <div id="bloc">
      <span class="etiquette">Bloc principal</span>
      <p class="para">Paragraphe A dans le bloc</p>
      <p class="para">Paragraphe B dans le bloc</p>
      <p class="para emphase">Paragraphe C dans le bloc (emphase)</p>
    </div>

    <div id="zone-ajout">
      <!-- Les nouveaux elements seront ajoutes ici -->
    </div>
  </div>

  <button id="btn-action">Cliquez ici</button>

  <script src="exe3.js"></script>
</body>
</html>
